<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="images/icon/favicon.png">
  <link rel="stylesheet" href="css/classes.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/swals.js"></script>
  <title>Bricked UP</title>
</head>

<body>
  <div id="main" class="main-container">
    <div class="header centered-content boring-element">
      <h1>BRICKED UP</h1>
    </div>

    <div class="col-dir">
      <div class="game-section">
        <div class="highlight-bg glow border">
          <canvas id="canvas" width="1000" height="700"></canvas>
        </div>
      </div>

      <div class="buttons-container centered-content">
        <button class="button smooth-box big-text" onclick="showHowToPlay()">
          <img src="images/site images/icons/info.svg" width="50px" height="50px" alt="How to play">
        </button>

        <button class="button smooth-box big-text" onclick="showLeaderboard()">
          <img src="images/site images/icons/leaderboard.svg" width="50px" height="50px" alt="Leaderboard">
        </button>

        <button class="button smooth-box big-text" onclick="showEditorPrompt()">
          <img src="images/site images/icons/editor.svg" width="50px" height="50px" alt="Editor">
        </button>
      </div>
    </div>
  </div>

  <script src="js/gameEngine.js"></script>
  <script src="js/gameObjects.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/levelHelpers.js"></script>
  <script src="js/gameLogic.js"></script>
  <script src="js/brickStats.js"></script>

  <script src="js/levelEditor.js"></script>
  <script src="js/htmlHelpers.js"></script>
</body>
</html>
