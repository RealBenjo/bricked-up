<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="images/icon/favicon.png">
  <link rel="stylesheet" href="css/classes.css">
  <link rel="stylesheet" href="css/style.css">
  <title>Bricked UP</title>
</head>

<body>
  <div id="main" class="main-container">
    <div class="header centered-content">
      <h1>BRICKED UP</h1>
    </div>

    <div class="content-wrapper">
      <div class="game-section">
        <div class="highlight-bg border">
          <canvas id="canvas" width="1000" height="700"></canvas>
        </div>
      </div>

      <div class="description-section">
        <div class="description-section smooth-box">
          <h2 class="centered-content">About the Game</h2>
          <div class="description-content">
            In Bricked UP your goal is to destroy <b>ALL</b>
             of the bricks. You also must <b>NOT</b> lose your balls, or else you will lose 
             <b>1 HEALTH POINT</b>
          </div>
        </div>

        <div class="description-section smooth-box">
          <div class="description-content">
            click on the <b>LEVEL EDITOR</b> button below if you want to 
            make your own levels or change existing levels.
          </div>
          <div class="button-container centered-content">
            <button class="button smooth-box big-text" onclick="toggleEditor()">LEVEL EDITOR</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/gameEngine.js"></script>
  <script src="js/gameObjects.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/levelHelpers.js"></script>
  <script src="js/gameLogic.js"></script>
  <script src="js/brickStats.js"></script>

  <script src="js/levelEditor.js"></script>
  <script src="js/htmlHelpers.js"></script>
</body>
</html>
